name: Bug report
description: Something in the Live Tokens app isn't working right
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Menu bar → Live Tokens → About Live Tokens
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.5"
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: Mac type
      description: Live Tokens currently ships for Apple silicon only.
      options:
        - Apple silicon (M-series)
        - Intel
    validations:
      required: true
  - type: checkboxes
    id: agents
    attributes:
      label: Which agents do you track?
      options:
        - label: Claude Code
        - label: Codex
        - label: Other / not sure
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or logs
      description: Drag in screenshots, or paste anything relevant from Console.app (search "Live Tokens").
