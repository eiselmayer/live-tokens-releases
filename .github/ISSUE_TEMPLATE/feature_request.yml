name: Feature request
description: Suggest an idea or improvement for Live Tokens
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that the app doesn't help with today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Alternatives you considered, mockups, examples from other apps…
